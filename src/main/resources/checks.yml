  ChestStealerA:
    enabled: true
    max-vl: 8.0
    max-clicks-per-second: 20

  AutoArmorA:
    enabled: true
    max-vl: 8.0
    min-equip-interval-ticks: 2

  FastEatA:
    enabled: true
    max-vl: 8.0
