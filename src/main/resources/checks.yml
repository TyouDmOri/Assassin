  TimerPacketA:
    enabled: true
    max-vl: 10.0
    max-packets-per-second: 500

  AutoTotemA:
    enabled: true
    max-vl: 8.0
    min-reswap-ms: 250

  AutoTotemB:
    enabled: true
    max-vl: 8.0
