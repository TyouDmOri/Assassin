    tolerance-ticks: 5

  # ─── Macro ──────────────────────────────────────────────────────────────────
  MacroSequenceA:
    enabled: true
    max-vl: 20.0
    max-repeat-count: 5
    min-actions: 20

  MacroTimingA:
    enabled: true
    max-vl: 20.0
    min-reaction-ms: 150
    min-consecutive: 5

  MacroVarianceA:
    enabled: true
    max-vl: 20.0
