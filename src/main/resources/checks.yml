  LiquidWalkA:
    enabled: true
    max-vl: 8.0

  AirPlaceA:
    enabled: true
    max-vl: 8.0

  # ─── Player ─────────────────────────────────────────────────────────────────
  InventoryA:
    enabled: true
    max-vl: 8.0
    min-open-ticks: 3
    min-speed-h: 0.05

  InventoryB:
    enabled: true
    max-vl: 8.0

  BadPacketsA:
    enabled: true
    max-vl: 3.0

  BadPacketsB:
    enabled: true
    max-vl: 3.0

  BadPacketsC:
    enabled: true
    max-vl: 3.0
    max-y-extreme: 1.0E7

  BadPacketsD:
    enabled: true
    max-vl: 3.0

  BadPacketsE:
    enabled: true
    max-vl: 3.0

  BadPacketsF:
    enabled: true
    max-vl: 3.0

  PostA:
    enabled: true
